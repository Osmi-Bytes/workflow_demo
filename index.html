<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Todo App Osmi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" aria-label="Todo application">
    <header class="app-header">
      <h1>Todo List</h1>
      <p>Capture tasks. Ship progress.</p>
    </header>

    <section class="todo-panel" aria-label="Todo controls">
      <form id="todo-form" class="todo-form">
        <label class="sr-only" for="todo-input">Add a task</label>
        <input id="todo-input" type="text" placeholder="What needs to be done?" maxlength="120" required />
        <button type="submit">Add</button>
      </form>

      <div class="toolbar">
        <div class="filters" role="group" aria-label="Filter tasks">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="active">Active</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button id="clear-completed" type="button" class="clear-btn">Clear completed</button>
      </div>

      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

      <footer class="status-row">
        <span id="items-left">0 items left</span>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
